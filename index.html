<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sunshine Squad</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/pages/home.css">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="container py-4">

    <!-- HERO -->
    <div class="mb-4">
      <h1 style="font-weight:800;letter-spacing:.3px;">Sunshine Squad</h1>
      <p class="text-muted-ss">División de clanes de Scythe Society — streams, juegos y proyectos.</p>
    </div>

    <!-- STREAM + CHAT -->
    <div class="card-dark mb-4">
      <div class="mb-3">
        <div style="font-weight:700;">📺 Twitch</div>
        <div class="text-muted-ss">Cambia de canal sin recargar la página</div>
      </div>

      <!-- Wrapper que mide su propia altura para sincronizar player y chat -->
      <div id="stream-row" style="display:flex;gap:12px;align-items:stretch;">

        <!-- Player (flex-grow para ocupar el máximo) -->
        <div id="player-wrap" style="flex:1 1 0;min-width:0;aspect-ratio:16/9;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.10);position:relative;">
          <iframe id="stream-iframe"
            allowfullscreen
            style="position:absolute;inset:0;width:100%;height:100%;border:0;">
          </iframe>
        </div>

        <!-- Chat (ancho fijo, altura = altura del player via JS) -->
        <div id="chat-wrap" style="width:300px;flex-shrink:0;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.10);">
          <iframe id="chat-iframe"
            style="width:100%;height:100%;border:0;display:block;">
          </iframe>
        </div>

        <!-- Lista de canales (ancho fijo) -->
        <div style="width:130px;flex-shrink:0;">
          <div style="font-weight:600;margin-bottom:.75rem;font-size:.9rem;">Canales</div>
          <div id="channel-list"></div>
        </div>

      </div>
    </div>

    <!-- JUEGOS -->
    <div class="card-dark">
      <div class="mb-3">
        <div id="games-title" style="font-weight:700;">Juegos</div>
      </div>
      <div id="games-strip"
        style="display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory;">
      </div>
    </div>

  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="assets/js/components.js"></script>
  <script type="module" src="assets/js/pages/home.js"></script>

</body>
</html>
