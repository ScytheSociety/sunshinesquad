<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Juegos · Sunshine Squad</title>

  <!-- ===================== NO TOCAR (BASE) ===================== -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <!-- =================== /NO TOCAR (BASE) ===================== -->

  <link rel="stylesheet" href="../../assets/css/pages/juegos.css">
</head>
<body>

  <!-- ===================== NO TOCAR (BASE) ===================== -->
  <div id="navbar-container"></div>
  <!-- =================== /NO TOCAR (BASE) ===================== -->

  <!-- ============================================================
       =================== TU CONTENIDO AQUÍ =====================
       ============================================================ -->
  <main class="container py-4">

    <!-- CABECERA -->
    <div class="mb-4">
      <h1 style="font-weight:800;">Juegos</h1>
      <p id="juegos-descripcion" class="text-muted-ss"></p>
    </div>

    <!-- BÚSQUEDA -->
    <input id="juegos-search" type="search" placeholder="Buscar juego...">

    <!-- FILTROS -->
    <div class="juegos-filtros">
      <button class="filtro-btn active" data-filtro="todos">🎮 Todos</button>
      <button class="filtro-btn" data-filtro="guild">⭐ Con clan</button>
      <button class="filtro-btn" data-filtro="serie">🎬 Con serie</button>
      <button class="filtro-btn" data-filtro="sss">🎮 SSS</button>
    </div>

    <!-- GRID DE JUEGOS -->
    <div id="juegos-grid" class="juegos-grid"></div>

  </main>
  <!-- ============================================================
       =================== FIN TU CONTENIDO ======================
       ============================================================ -->

  <!-- ===================== NO TOCAR (BASE) ===================== -->
  <div id="footer-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/components.js"></script>
  <!-- =================== /NO TOCAR (BASE) ===================== -->

  <script type="module" src="../../assets/js/pages/juegos.js"></script>

</body>
</html>
