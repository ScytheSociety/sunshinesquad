<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MVP Tracker · Ragnarok Online · Sunshine Squad</title>
  <meta name="description" content="Seguimiento de MVPs de Ragnarok Online en tiempo real.">
  <meta property="og:title" content="MVP Tracker · Ragnarok Online · Sunshine Squad">
  <meta property="og:description" content="Seguimiento de MVPs de Ragnarok Online en tiempo real.">
  <meta property="og:image" content="https://i.imgur.com/p7OlADi.gif">
  <meta property="og:url" content="https://sunshinesquad.es/pages/juegos/ragnarok/mvp.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Sunshine Squad">
  <meta name="twitter:card" content="summary">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/main.css">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="container py-4">

    <!-- Header -->
    <div class="d-flex align-items-start justify-content-between gap-3 mb-4 flex-wrap">
      <div>
        <h1 style="font-size:1.8rem;font-weight:900;margin-bottom:.25rem;">💀 MVP Tracker</h1>
        <p class="text-muted-ss mb-0">Ragnarok Online · Respawns en tiempo real</p>
      </div>
      <div class="d-flex gap-2 align-items-center">
        <span id="refresh-badge" style="font-size:.72rem;color:rgba(255,255,255,.3);"></span>
        <button id="refresh-btn" class="btn btn-sm"
          style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);">
          ↻ Actualizar
        </button>
        <a href="ragnarok.html" class="btn btn-sm"
          style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);">
          ← Ragnarok
        </a>
      </div>
    </div>

    <!-- Filtros -->
    <div class="d-flex gap-2 flex-wrap mb-4">
      <button class="btn btn-sm btn-indigo active" data-filter="all">Todos</button>
      <button class="btn btn-sm" data-filter="spawning"
        style="background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);color:#86efac;">
        ✅ Disponible
      </button>
      <button class="btn btn-sm" data-filter="soon"
        style="background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);color:#fcd34d;">
        ⏰ Pronto (&lt;30 min)
      </button>
      <button class="btn btn-sm" data-filter="waiting"
        style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);">
        🔒 En cooldown
      </button>
    </div>

    <!-- Grid de MVPs -->
    <div id="mvp-grid" class="row g-3">
      <div class="col-12 text-center py-5" style="color:rgba(255,255,255,.3);">Cargando MVPs…</div>
    </div>

  </main>

  <div id="footer-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../../assets/js/components.js"></script>
  <script type="module" src="../../../assets/js/pages/mvp.js"></script>
</body>
</html>
