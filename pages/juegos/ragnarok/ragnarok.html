<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ragnarok Online · Sunshine Squad</title>

  <!-- ===================== NO TOCAR (BASE) ===================== -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/main.css">
  <!-- =================== /NO TOCAR (BASE) ===================== -->

  <link rel="stylesheet" href="../../../assets/css/pages/ragnarok.css">
</head>
<body>

  <!-- ===================== NO TOCAR (BASE) ===================== -->
  <div id="navbar-container"></div>
  <!-- =================== /NO TOCAR (BASE) ===================== -->

  <!-- ============================================================
       =================== TU CONTENIDO AQUÍ =====================
       ============================================================ -->
  <main class="container py-4">

    <!-- CABECERA -->
    <div class="mb-4">
      <div class="text-muted-ss mb-1">Juegos</div>
      <h1 style="font-weight:800;">Ragnarok Online</h1>
      <p id="ro-descripcion" class="text-muted-ss"></p>
    </div>

    <!-- PESTAÑAS -->
    <div class="mb-4" style="border-bottom:1px solid rgba(255,255,255,.10);">
      <div style="display:flex;gap:4px;">
        <button class="tab-btn active" data-tab="inicio">🏠 Inicio</button>
        <button class="tab-btn" data-tab="guias">📖 Guías</button>
        <button class="tab-btn" data-tab="builds">⚔️ Builds</button>
      </div>
    </div>

    <!-- PESTAÑA: INICIO -->
    <div id="tab-inicio" class="tab-content">

      <div class="card-dark mb-4">

        <!-- CABECERA SERVIDOR: logo + título + botones -->
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">

          <div class="d-flex align-items-center gap-3">
            <img id="servidor-logo" src="" alt="uaRO"
                 style="height:36px;object-fit:contain;">
            <div>
              <div style="font-weight:700;font-size:1rem;">Servidor oficial de la comunidad</div>
              <div class="text-muted-ss" style="font-size:.8rem;">Únete y juega con Sunshine Squad</div>
            </div>
          </div>

          <!-- BOTONES COMPACTOS -->
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <a id="btn-descarga" href="#" target="_blank"
               style="display:none;align-items:center;gap:5px;padding:.38rem .85rem;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#e5e7eb;font-size:.8rem;text-decoration:none;"
               onmouseover="this.style.background='rgba(255,255,255,.11)'"
               onmouseout="this.style.background='rgba(255,255,255,.06)'">
              ⬇️ Descargar
            </a>
            <a id="btn-discord" href="#" target="_blank"
               style="display:inline-flex;align-items:center;gap:5px;padding:.38rem .85rem;border-radius:8px;border:1px solid rgba(88,101,242,.4);background:rgba(88,101,242,.12);color:#e5e7eb;font-size:.8rem;text-decoration:none;"
               onmouseover="this.style.background='rgba(88,101,242,.22)'"
               onmouseout="this.style.background='rgba(88,101,242,.12)'">
              💬 Discord
            </a>
            <a id="btn-web" href="#" target="_blank"
               style="display:inline-flex;align-items:center;gap:5px;padding:.38rem .85rem;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#e5e7eb;font-size:.8rem;text-decoration:none;"
               onmouseover="this.style.background='rgba(255,255,255,.11)'"
               onmouseout="this.style.background='rgba(255,255,255,.06)'">
              🌐 Web
            </a>
            <a id="btn-wiki" href="#" target="_blank"
               style="display:inline-flex;align-items:center;gap:5px;padding:.38rem .85rem;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#e5e7eb;font-size:.8rem;text-decoration:none;"
               onmouseover="this.style.background='rgba(255,255,255,.11)'"
               onmouseout="this.style.background='rgba(255,255,255,.06)'">
              📚 Wiki
            </a>
          </div>
        </div>

        <!-- DESCRIPCIÓN -->
        <p id="servidor-descripcion"
           style="color:rgba(255,255,255,.55);font-size:.88rem;line-height:1.6;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid rgba(255,255,255,.07);"></p>

        <!-- TABLA CONFIGURACIÓN (rates incluidos aquí) -->
        <div style="font-weight:700;margin-bottom:.85rem;font-size:.9rem;">⚙️ Configuración del servidor</div>
        <div id="servidor-tabla" class="ro-tabla"></div>

      </div>

      <!-- GALERÍA -->
      <div class="card-dark">
        <div style="font-weight:700;margin-bottom:1rem;">📸 Galería</div>
        <div id="galeria-strip"
          style="display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory;">
        </div>
      </div>

    </div>

    <!-- PESTAÑA: GUÍAS -->
    <div id="tab-guias" class="tab-content" style="display:none;">
      <div id="guias-grid" class="ro-grid"></div>
    </div>

    <!-- PESTAÑA: BUILDS -->
    <div id="tab-builds" class="tab-content" style="display:none;">
      <div id="builds-grid" class="ro-grid"></div>
    </div>

  </main>
  <!-- ============================================================
       =================== FIN TU CONTENIDO ======================
       ============================================================ -->

  <!-- ===================== NO TOCAR (BASE) ===================== -->
  <div id="footer-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../../assets/js/components.js"></script>
  <!-- =================== /NO TOCAR (BASE) ===================== -->

  <script type="module" src="../../../assets/js/pages/ragnarok.js"></script>

</body>
</html>
