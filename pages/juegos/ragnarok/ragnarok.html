<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ragnarok Online · Sunshine Squad</title>

  <!-- ===================== NO TOCAR (BASE) ===================== -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/main.css">
  <!-- =================== /NO TOCAR (BASE) ===================== -->

  <link rel="stylesheet" href="../../../assets/css/pages/ragnarok.css">
</head>
<body>

  <!-- ===================== NO TOCAR (BASE) ===================== -->
  <div id="navbar-container"></div>
  <!-- =================== /NO TOCAR (BASE) ===================== -->

  <!-- ============================================================
       =================== TU CONTENIDO AQUÍ =====================
       ============================================================ -->
  <main class="container py-4">

    <!-- CABECERA -->
    <div class="mb-4">
      <div class="text-muted-ss mb-1">Juegos</div>
      <h1 style="font-weight:800;">Ragnarok Online</h1>
      <p id="ro-descripcion" class="text-muted-ss"></p>
    </div>

    <!-- PESTAÑAS -->
    <div class="mb-4" style="border-bottom:1px solid rgba(255,255,255,.10);">
      <div style="display:flex;gap:4px;">
        <button class="tab-btn active" data-tab="inicio">🏠 Inicio</button>
        <button class="tab-btn" data-tab="guias">📖 Guías</button>
        <button class="tab-btn" data-tab="builds">⚔️ Builds</button>
      </div>
    </div>

    <!-- PESTAÑA: INICIO -->
    <div id="tab-inicio" class="tab-content">

      <!-- SERVIDOR -->
      <div class="card-dark mb-4">
        <div class="d-flex flex-wrap align-items-center gap-3 mb-4">
          <img id="servidor-logo" src="" alt="uaRO"
               style="height:40px;object-fit:contain;">
          <div>
            <div style="font-weight:700;font-size:1.1rem;">Servidor oficial de la comunidad</div>
            <div class="text-muted-ss">El servidor donde jugamos juntos</div>
          </div>
        </div>

        <!-- BOTONES -->
        <div class="d-flex flex-wrap gap-2 mb-4">
          <a id="btn-descarga" href="#" target="_blank"
             style="display:none;"
             class="btn-ss">⬇️ Descargar instalador</a>
          <a id="btn-web" href="#" target="_blank"
             class="btn-ss">🌐 Página web</a>
          <a id="btn-wiki" href="#" target="_blank"
             class="btn-ss">📚 Documentación</a>
        </div>

        <!-- RATES Y INFO -->
        <div class="row g-3">
          <div class="col-12 col-md-4">
            <div class="ro-info-box">
              <div class="ro-info-label">Rates semana</div>
              <div id="rates-base" class="ro-info-valor"></div>
            </div>
          </div>
          <div class="col-12 col-md-4">
            <div class="ro-info-box">
              <div class="ro-info-label">Rates fin de semana</div>
              <div id="rates-finde" class="ro-info-valor"></div>
            </div>
          </div>
        </div>

        <!-- TABLA DE INFO -->
        <div class="mt-4">
          <div style="font-weight:700;margin-bottom:.75rem;">⚙️ Configuración del servidor</div>
          <div id="servidor-tabla" class="ro-tabla"></div>
        </div>
      </div>

      <!-- GALERÍA -->
      <div class="card-dark">
        <div style="font-weight:700;margin-bottom:1rem;">📸 Galería</div>
        <div id="galeria-strip"
          style="display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory;">
        </div>
      </div>

    </div>

    <!-- PESTAÑA: GUÍAS -->
    <div id="tab-guias" class="tab-content" style="display:none;">
      <div id="guias-grid" class="ro-grid"></div>
    </div>

    <!-- PESTAÑA: BUILDS -->
    <div id="tab-builds" class="tab-content" style="display:none;">
      <div id="builds-grid" class="ro-grid"></div>
    </div>

  </main>
  <!-- ============================================================
       =================== FIN TU CONTENIDO ======================
       ============================================================ -->

  <!-- ===================== NO TOCAR (BASE) ===================== -->
  <div id="footer-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../../assets/js/components.js"></script>
  <!-- =================== /NO TOCAR (BASE) ===================== -->

  <script type="module" src="../../../assets/js/pages/ragnarok.js"></script>

</body>
</html>
