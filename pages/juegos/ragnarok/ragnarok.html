<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ragnarok Online · Sunshine Squad</title>
  <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/sun_2600-fe0f.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/main.css">
  <link rel="stylesheet" href="../../../assets/css/pages/ragnarok.css">
</head>
<body data-game="ragnarok">

  <div id="navbar-container"></div>

  <main class="container py-4">

    <!-- CABECERA -->
    <div class="mb-4">
      <div class="text-muted-ss mb-1">Juegos</div>
      <h1>Ragnarok Online</h1>
      <p id="game-descripcion" class="text-muted-ss"></p>
    </div>

    <!-- PESTAÑAS -->
    <div class="mb-4" style="border-bottom:1px solid rgba(255,255,255,.10);">
      <div style="display:flex;gap:4px;flex-wrap:wrap;">
        <button class="tab-btn active" data-tab="inicio">🏠 Inicio</button>
        <button class="tab-btn" data-tab="clan">⚔️ Clan</button>
        <button class="tab-btn" data-tab="guias">📖 Guías</button>
        <button class="tab-btn" data-tab="builds">🛡️ Builds</button>
      </div>
    </div>

    <!-- PESTAÑA: INICIO -->
    <div id="tab-inicio" class="tab-content">

      <!-- SERVIDOR -->
      <div class="card-dark mb-4">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">
          <div class="d-flex align-items-center gap-3">
            <img id="servidor-logo" src="" alt="uaRO" style="height:36px;object-fit:contain;">
            <div>
              <div style="font-weight:700;font-size:1rem;">Servidor oficial de la comunidad</div>
              <div class="text-muted-ss" style="font-size:.8rem;">Únete y juega con Sunshine Squad</div>
            </div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <a id="btn-descarga" href="#" target="_blank" class="btn-ss" style="display:none;width:auto;">⬇️ Descargar</a>
            <a id="btn-discord" href="#" target="_blank" class="btn-indigo" style="display:none;width:auto;">💬 Discord</a>
            <a id="btn-web" href="#" target="_blank" class="btn-ss" style="display:none;width:auto;">🌐 Web</a>
            <a id="btn-wiki" href="#" target="_blank" class="btn-ss" style="display:none;width:auto;">📚 Wiki</a>
          </div>
        </div>

        <p id="servidor-descripcion"
           style="color:rgba(255,255,255,.55);font-size:.88rem;line-height:1.6;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid rgba(255,255,255,.07);"></p>

        <div class="section-title mb-3">⚙️ Configuración del servidor</div>
        <div id="servidor-tabla" class="ro-tabla"></div>
      </div>

      <!-- GALERÍA DE IMÁGENES -->
      <div class="card-dark mb-4">
        <div class="section-title mb-3">📸 Galería</div>
        <div class="galeria-outer">
          <button id="galeria-prev" class="galeria-arrow">←</button>
          <div class="galeria-strip-wrap">
            <div id="galeria-strip" class="galeria-strip"></div>
          </div>
          <button id="galeria-next" class="galeria-arrow">→</button>
        </div>
        <div id="galeria-dots" class="galeria-dots"></div>
      </div>

      <!-- GALERÍA DE VIDEOS -->
      <div class="card-dark">
        <div class="section-title mb-3">🎬 Videos</div>
        <div class="videos-outer">
          <button id="videos-prev" class="videos-arrow">←</button>
          <div class="videos-strip-wrap">
            <div id="videos-strip" class="videos-strip"></div>
          </div>
          <button id="videos-next" class="videos-arrow">→</button>
        </div>
        <div id="videos-dots" class="videos-dots"></div>
      </div>

    </div>

    <!-- PESTAÑA: CLAN -->
    <div id="tab-clan" class="tab-content" style="display:none;">
      <div class="card-dark">
        <div class="section-title mb-3">👥 Miembros del clan</div>
        <div id="clan-content"><div class="text-muted-ss" style="font-size:.85rem;">Cargando...</div></div>
      </div>
    </div>

    <!-- PESTAÑA: GUÍAS -->
    <div id="tab-guias" class="tab-content" style="display:none;">
      <div id="guias-grid" class="ro-grid"></div>
    </div>

    <!-- PESTAÑA: BUILDS -->
    <div id="tab-builds" class="tab-content" style="display:none;">
      <div id="builds-grid" class="ro-grid"></div>
    </div>

  </main>

  <div id="footer-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../../assets/js/components.js"></script>
  <script type="module" src="../../../assets/js/pages/game.js"></script>

</body>
</html>
