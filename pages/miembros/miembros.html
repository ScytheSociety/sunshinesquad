<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Miembros · Sunshine Squad</title>
  <meta name="description" content="Directorio de jugadores de Sunshine Squad.">
  <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/sun_2600-fe0f.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/pages/perfil.css">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="container py-4">

    <!-- Header -->
    <div class="d-flex align-items-start justify-content-between gap-3 mb-4 flex-wrap">
      <div>
        <h1 style="font-size:1.8rem;font-weight:900;margin-bottom:.25rem;">👥 Miembros</h1>
        <p class="text-muted-ss mb-0">Directorio de jugadores de la comunidad.</p>
      </div>
      <div id="mi-perfil-btn-wrap"></div>
    </div>

    <!-- Filtros por juego -->
    <div class="d-flex gap-2 flex-wrap mb-4" id="filtros-juego">
      <button class="btn btn-sm btn-indigo active" data-game="">Todos</button>
    </div>

    <!-- Grid de miembros -->
    <div id="members-grid" style="
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
      gap:1rem;
    ">
      <div style="text-align:center;color:rgba(255,255,255,.3);padding:3rem;grid-column:1/-1;">
        Cargando miembros…
      </div>
    </div>

  </main>

  <div id="footer-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/components.js"></script>
  <script type="module" src="../../assets/js/pages/miembros.js"></script>
</body>
</html>
