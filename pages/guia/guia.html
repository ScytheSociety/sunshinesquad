<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Guía · Sunshine Squad</title>
  <meta name="description" content="">
  <meta property="og:title" content="Guía · Sunshine Squad">
  <meta property="og:description" content="">
  <meta property="og:image" content="https://i.imgur.com/p7OlADi.gif">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="Sunshine Squad">
  <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/sun_2600-fe0f.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/pages/blog.css">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="container py-4" style="max-width:860px;">

    <!-- Breadcrumb (se completa dinámicamente) -->
    <nav id="breadcrumb-nav" style="font-size:.82rem;color:rgba(255,255,255,.35);margin-bottom:1.5rem;">
      <a href="../../" style="color:rgba(255,255,255,.35);text-decoration:none;">Inicio</a>
      <span class="mx-2">›</span>
      <a id="breadcrumb-game" href="#" style="color:rgba(255,255,255,.35);text-decoration:none;">Juego</a>
      <span class="mx-2">›</span>
      <span id="breadcrumb-tipo" style="color:rgba(255,255,255,.35);">Guías</span>
      <span class="mx-2">›</span>
      <span id="breadcrumb-titulo" style="color:rgba(255,255,255,.6);">...</span>
    </nav>

    <!-- Contenido del post -->
    <div id="post-wrap">
      <div class="text-center py-5" style="color:rgba(255,255,255,.3);">Cargando...</div>
    </div>

    <!-- Rating -->
    <div class="card-dark mt-4" id="rating-wrap" style="display:none;">
      <div style="font-weight:700;margin-bottom:.75rem;">⭐ Califica esta publicación</div>
      <div id="rating-info" style="font-size:.85rem;color:rgba(255,255,255,.4);margin-bottom:.75rem;"></div>
      <div class="stars" id="star-rating">
        <span class="star" data-v="1">★</span>
        <span class="star" data-v="2">★</span>
        <span class="star" data-v="3">★</span>
        <span class="star" data-v="4">★</span>
        <span class="star" data-v="5">★</span>
      </div>
      <div id="rating-msg" style="font-size:.8rem;color:rgba(255,255,255,.35);margin-top:.5rem;"></div>
    </div>

    <!-- Comentarios -->
    <div class="card-dark mt-4">
      <div style="font-weight:700;font-size:1rem;margin-bottom:1rem;">
        💬 Comentarios <span id="comentarios-count" style="font-size:.8rem;color:rgba(255,255,255,.35);font-weight:400;"></span>
      </div>

      <div id="comment-form-wrap" class="mb-4">
        <div id="comment-login-msg" style="display:none;font-size:.85rem;color:rgba(255,255,255,.4);padding:.75rem;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid rgba(255,255,255,.08);">
          <a href="#" id="comment-login-link" style="color:#a5b4fc;">Inicia sesión con Discord</a> para dejar un comentario.
        </div>
        <div id="comment-form" style="display:none;">
          <textarea id="comment-text" rows="3" placeholder="Escribe tu comentario..."
            style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:.75rem 1rem;color:#fff;font-size:.9rem;resize:vertical;outline:none;"></textarea>
          <div class="d-flex justify-content-end mt-2">
            <button id="comment-submit" class="btn-ss active" style="font-size:.85rem;padding:.4rem 1.1rem;">Publicar</button>
          </div>
        </div>
      </div>

      <div id="comentarios-list"></div>
      <div id="comentarios-pag" class="blog-pag mt-3"></div>
    </div>

  </main>

  <div id="footer-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- marked.js para renderizar Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script type="module" src="../../assets/js/components.js"></script>
  <script type="module" src="../../assets/js/pages/guia.js"></script>
</body>
</html>
