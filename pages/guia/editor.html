<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editor · Guía/Build · Sunshine Squad</title>
  <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/sun_2600-fe0f.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/pages/admin.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-4" style="max-width:900px;">

    <div class="admin-page-header">
      <button id="btn-back" class="btn-ss" style="width:auto;">← Volver</button>
      <div>
        <h1 id="editor-title">✏️ Nueva publicación</h1>
        <p class="subtitle" id="editor-subtitle">Guía / Build</p>
      </div>
      <div id="admin-role-badge" class="admin-role-badge ms-auto"></div>
    </div>

    <!-- Acceso denegado -->
    <div id="access-denied" class="card-dark text-center py-5" style="display:none;">
      <div style="font-size:3rem;">🔒</div>
      <h3 style="color:#ef4444;margin:.75rem 0 .5rem;">Acceso denegado</h3>
      <p class="text-muted-ss">Necesitas ser Editor, Moderador o Admin.</p>
    </div>

    <div id="editor-content" style="display:none;">

      <div class="card-dark mb-3">
        <div class="row g-3">

          <!-- Tipo (oculto si viene de URL, visible si es nuevo sin tipo) -->
          <div class="col-md-4" id="tipo-wrap">
            <label class="admin-label">Tipo</label>
            <select id="f-tipo" class="form-select" style="background:#1a1d27;color:#fff;border-color:rgba(255,255,255,.15);">
              <option value="guia">📖 Guía</option>
              <option value="build">🔧 Build</option>
            </select>
          </div>

          <div class="col-md-8">
            <label class="admin-label">Título <span style="color:#ef4444;">*</span></label>
            <input type="text" id="f-titulo" class="form-control" placeholder="Título de la guía o build...">
          </div>

          <div class="col-12">
            <label class="admin-label">Resumen corto</label>
            <input type="text" id="f-resumen" class="form-control" placeholder="Descripción breve que aparece en la tarjeta...">
          </div>

          <div class="col-12">
            <label class="admin-label">Imagen de portada (URL)</label>
            <input type="text" id="f-portada" class="form-control" placeholder="https://...">
            <div id="portada-preview" style="margin-top:.5rem;display:none;">
              <img id="portada-img" src="" style="max-height:120px;border-radius:8px;border:1px solid rgba(255,255,255,.1);">
            </div>
          </div>

        </div>
      </div>

      <!-- Contenido (HTML / Markdown) -->
      <div class="card-dark mb-3">
        <div class="d-flex align-items-center justify-content-between mb-2 gap-2 flex-wrap">
          <div class="admin-form-title mb-0">Contenido</div>
          <div class="d-flex gap-2">
            <button id="btn-preview-toggle" class="btn-ss" style="font-size:.78rem;padding:.3rem .8rem;">👁️ Vista previa</button>
          </div>
        </div>
        <p style="font-size:.73rem;color:rgba(255,255,255,.35);margin-bottom:.6rem;">
          Acepta HTML o Markdown. El sistema detecta el formato automáticamente.
        </p>
        <textarea id="f-contenido" rows="18"
          style="width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:10px;
                 padding:.75rem 1rem;color:#fff;font-size:.88rem;font-family:monospace;line-height:1.6;resize:vertical;outline:none;"
          placeholder="Escribe el contenido aquí...&#10;&#10;# Título&#10;## Subtítulo&#10;**negrita**, *cursiva*, `código`&#10;&#10;O usa HTML directamente."></textarea>
        <div id="content-preview" class="post-content" style="display:none;padding:1rem;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);border-radius:10px;margin-top:.5rem;min-height:80px;"></div>
      </div>

      <!-- Publicar / guardar -->
      <div class="card-dark d-flex align-items-center justify-content-between gap-3 flex-wrap">
        <label class="d-flex align-items-center gap-2" style="cursor:pointer;">
          <input type="checkbox" id="f-publicado" style="width:16px;height:16px;">
          <span style="font-size:.88rem;color:rgba(255,255,255,.7);">Publicar inmediatamente</span>
        </label>
        <div class="d-flex gap-2">
          <button id="btn-guardar" class="btn-indigo" style="min-width:120px;">Guardar</button>
        </div>
      </div>

    </div><!-- /editor-content -->

  </main>

  <div id="footer-container"></div>
  <div id="admin-toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script type="module" src="../../assets/js/components.js"></script>
  <script type="module" src="../../assets/js/pages/guia-editor.js"></script>
</body>
</html>
