<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin · Juegos · Sunshine Squad</title>
  <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/sun_2600-fe0f.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/pages/admin.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-4">

    <!-- Header -->
    <div class="admin-page-header">
      <a href="index.html" class="btn-ss" style="width:auto;">← Dashboard</a>
      <div>
        <h1>🎮 Gestión de Juegos</h1>
        <p class="subtitle">Agrega, edita y reordena los juegos del sitio</p>
      </div>
      <div id="admin-role-badge" class="admin-role-badge ms-auto"></div>
    </div>

    <!-- Acceso denegado -->
    <div id="access-denied" class="card-dark text-center py-5" style="display:none;">
      <div style="font-size:3rem;">🔒</div>
      <h3 style="color:#ef4444;margin:.75rem 0 .5rem;">Acceso denegado</h3>
      <p class="text-muted-ss">Necesitas ser Editor, Moderador o Admin.</p>
    </div>

    <div id="admin-content" style="display:none;">
      <div class="row g-4">

        <!-- Lista de juegos -->
        <div class="col-lg-7">
          <div class="card-dark">
            <div class="d-flex align-items-center justify-content-between mb-3">
              <div class="admin-form-title mb-0">Juegos registrados</div>
              <button class="btn-indigo" style="font-size:.8125rem;" id="btn-new-game">+ Nuevo juego</button>
            </div>
            <div id="games-list"><div class="admin-loading">Cargando...</div></div>
          </div>
        </div>

        <!-- Formulario -->
        <div class="col-lg-5">
          <div class="card-dark" id="game-form-card">
            <div class="admin-form-title mb-3" id="form-title">Nuevo juego</div>
            <form id="game-form" autocomplete="off">
              <input type="hidden" id="f-id">
              <div class="mb-2">
                <label class="admin-label">Nombre *</label>
                <input type="text" class="form-control" id="f-nombre" required>
              </div>
              <div class="mb-2">
                <label class="admin-label">URL imagen</label>
                <div class="input-group">
                  <input type="text" class="form-control" id="f-imagen" placeholder="assets/images/games/nombre.jpg">
                  <a href="images.html" target="_blank" class="input-group-text" title="Abrir galería de imágenes" style="font-size:.75rem;cursor:pointer;text-decoration:none;">🖼️</a>
                </div>
                <div style="font-size:.7rem;color:rgba(255,255,255,.3);margin-top:.2rem;">Pega una URL de la galería o usa la ruta relativa del repo</div>
                <div id="f-imagen-preview" style="margin-top:.4rem;display:none;">
                  <img id="img-preview-el" src="" style="max-height:60px;border-radius:6px;border:1px solid rgba(255,255,255,.1);">
                </div>
              </div>
              <div class="mb-2">
                <label class="admin-label">Descripción</label>
                <input type="text" class="form-control" id="f-descripcion">
              </div>
              <div class="mb-2">
                <label class="admin-label">Servidor</label>
                <input type="text" class="form-control" id="f-servidor">
              </div>
              <div class="mb-2">
                <label class="admin-label">URL de la página</label>
                <input type="text" class="form-control" id="f-url" placeholder="pages/juegos/nombre/nombre.html">
              </div>
              <div class="mb-2 d-flex gap-3 flex-wrap">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="f-guild">
                  <label class="form-check-label" for="f-guild">⭐ Guild activo</label>
                </div>
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="f-serie">
                  <label class="form-check-label" for="f-serie">🎬 Serie stream</label>
                </div>
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="f-sss">
                  <label class="form-check-label" for="f-sss">🎮 SSS (juego propio)</label>
                </div>
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="f-activo" checked>
                  <label class="form-check-label" for="f-activo">✓ Activo</label>
                </div>
              </div>
              <div class="mb-3">
                <label class="admin-label">Juego del bot Discord</label>
                <select class="form-select" id="f-bot-key" style="background:#1a1d27;color:#fff;border-color:rgba(255,255,255,.15);">
                  <option value="">— Sin vincular —</option>
                </select>
              </div>
              <div class="d-flex gap-2">
                <button type="submit" class="btn-indigo flex-fill">Guardar</button>
                <button type="button" class="btn-ss flex-fill" id="btn-cancel-game">Cancelar</button>
              </div>
            </form>
          </div>
        </div>

      </div>
    </div>

  </main>

  <div id="footer-container"></div>
  <div id="admin-toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/components.js"></script>
  <script type="module" src="../../assets/js/pages/admin-games.js"></script>
</body>
</html>
