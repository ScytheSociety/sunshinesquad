<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Catálogo Tier List · Admin · Sunshine Squad</title>
  <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/sun_2600-fe0f.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/pages/tierlist.css">
  <link rel="stylesheet" href="../../assets/css/pages/admin.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-4">

    <!-- Header -->
    <div class="admin-page-header mb-4">
      <a href="index.html" class="btn-ss" style="width:auto;">← Dashboard</a>
      <div>
        <h1>🏅 Catálogo Tier List</h1>
        <p class="subtitle">Gestiona clases, roles y skills por juego</p>
      </div>
      <div id="admin-role-badge" class="admin-role-badge ms-auto"></div>
    </div>

    <!-- Selector de juego -->
    <div class="card-dark mb-4">
      <div class="d-flex gap-3 flex-wrap align-items-stretch">
        <!-- Left: game cover image + URL input -->
        <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0;">
          <div id="game-cover-panel" style="width:120px;aspect-ratio:4/5;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);position:relative;">
            <img id="game-cover-img" src="" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;" loading="lazy">
            <div id="game-cover-placeholder" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.3);">
              <div style="font-size:2rem;margin-bottom:.3rem;">🎮</div>
              <div style="font-size:.72rem;">Sin imagen</div>
            </div>
          </div>
          <div style="display:flex;gap:6px;width:120px;">
            <input id="game-cover-url" class="tl-input" type="url" placeholder="URL..." style="flex:1;min-width:0;font-size:.72rem;padding:.3rem .5rem;">
            <button id="btn-save-cover" class="btn-ss" style="font-size:.72rem;padding:.3rem .6rem;flex-shrink:0;">💾</button>
          </div>
        </div>
        <!-- Right: selector + buttons -->
        <div style="flex:1;min-width:200px;">
          <label class="tl-field-label mb-1" style="font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;opacity:.6;">Juego activo</label>
          <select id="adm-game" class="tl-select" style="font-size:1.05rem;font-weight:700;padding:.55rem .9rem;margin-bottom:.75rem;max-width:360px;display:block;width:100%;">
            <option value="ragnarok">Ragnarok Online</option>
            <option value="wow">World of Warcraft</option>
            <option value="lineage2">Lineage 2</option>
            <option value="brawlstars">Brawl Stars</option>
            <option value="throneandliberty">Throne &amp; Liberty</option>
          </select>
          <div class="d-flex gap-2 flex-wrap">
            <button id="btn-seed-defaults" class="btn-ss" style="font-size:.78rem;padding:.35rem .75rem;">📦 Importar defaults</button>
            <button id="btn-reload" class="btn-ss" style="font-size:.78rem;padding:.35rem .75rem;">🔄 Recargar</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs admin-tabs mb-4" id="catalog-tabs">
      <li class="nav-item"><button class="nav-link active" data-tab="items">Clases / Ítems</button></li>
      <li class="nav-item"><button class="nav-link" data-tab="roles">Roles</button></li>
      <li class="nav-item"><button class="nav-link" data-tab="skills">Skills</button></li>
      <li class="nav-item"><button class="nav-link" data-tab="talents">Talentos</button></li>
    </ul>

    <!-- ─── TAB: ITEMS ─────────────────────────────────────────────── -->
    <div id="tab-items">

      <!-- Formulario añadir/editar item -->
      <div class="card-dark mb-4">
        <div class="admin-form-title" id="item-form-title">Añadir clase / ítem</div>
        <div class="row g-3">
          <div class="col-md-3">
            <label class="tl-field-label">Nombre *</label>
            <input id="item-name" class="tl-input" type="text" placeholder="Lord Knight">
          </div>
          <div class="col-md-2">
            <label class="tl-field-label">Categoría</label>
            <select id="item-category" class="tl-select">
              <option value="general">General</option>
              <option value="pvm">PvM</option>
              <option value="pvp">PvP</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="tl-field-label">Imagen (Masc / Única)</label>
            <input id="item-img" class="tl-input" type="url" placeholder="https://...">
          </div>
          <div class="col-md-3">
            <label class="tl-field-label">Imagen Femenina</label>
            <input id="item-img-f" class="tl-input" type="url" placeholder="https://... (opcional)">
          </div>
          <div class="col-md-2">
            <label class="tl-field-label">Orden</label>
            <input id="item-order" class="tl-input" type="number" value="0" min="0">
          </div>
          <div class="col-md-2 d-flex align-items-center gap-2 pt-3">
            <input id="item-dual" type="checkbox" style="width:16px;height:16px;accent-color:#6366f1;">
            <label for="item-dual" class="tl-field-label mb-0" style="cursor:pointer;">Doble arma (TnL)</label>
          </div>
          <div class="col-12 d-flex gap-2 align-items-center">
            <button id="btn-save-item" class="btn-ss active">💾 Guardar</button>
            <button id="btn-cancel-item" class="btn-ss" style="display:none;">✕ Cancelar</button>
            <div id="item-preview" class="admin-preview" style="display:none;">
              <img id="item-preview-img"  src="" alt="M" class="admin-preview-img" title="Masculino / Único">
              <img id="item-preview-imgf" src="" alt="F" class="admin-preview-img" title="Femenino" style="display:none;">
            </div>
          </div>
        </div>
      </div>

      <!-- Lista de items -->
      <div class="card-dark">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <div class="tl-field-label mb-0" id="items-count">Cargando...</div>
          <input id="items-search" class="tl-input" type="search" placeholder="Buscar..." style="max-width:200px;">
        </div>
        <div id="items-list" class="admin-items-grid">
          <div class="admin-loading">Cargando...</div>
        </div>
      </div>
    </div>

    <!-- ─── TAB: ROLES ─────────────────────────────────────────────── -->
    <div id="tab-roles" style="display:none;">
      <div class="card-dark mb-4">
        <div class="admin-form-title" id="role-form-title">Añadir rol</div>
        <div class="row g-3 align-items-end">
          <div class="col-md-3">
            <label class="tl-field-label">Nombre *</label>
            <input id="role-name" class="tl-input" type="text" placeholder="Tank">
          </div>
          <div class="col-md-2">
            <label class="tl-field-label">Icono (emoji)</label>
            <input id="role-icon" class="tl-input" type="text" placeholder="🛡️" maxlength="4">
          </div>
          <div class="col-md-2">
            <label class="tl-field-label">Color</label>
            <input id="role-color" class="tl-input" type="color" value="#3b82f6" style="height:42px;padding:.2rem;">
          </div>
          <div class="col-md-2">
            <label class="tl-field-label">Orden</label>
            <input id="role-order" class="tl-input" type="number" value="0" min="0">
          </div>
          <div class="col-md-3 d-flex gap-2">
            <button id="btn-save-role" class="btn-ss active">💾 Guardar</button>
            <button id="btn-cancel-role" class="btn-ss" style="display:none;">✕ Cancelar</button>
          </div>
        </div>
      </div>
      <div class="card-dark">
        <div class="tl-field-label mb-3" id="roles-count">Cargando...</div>
        <div id="roles-list" class="admin-rows">
          <div class="admin-loading">Cargando...</div>
        </div>
      </div>
    </div>

    <!-- ─── TAB: SKILLS ────────────────────────────────────────────── -->
    <div id="tab-skills" style="display:none;">
      <div class="card-dark mb-4">
        <div class="admin-form-title" id="skill-form-title">Añadir skill</div>
        <div class="row g-3 align-items-end">
          <div class="col-md-3">
            <label class="tl-field-label">Nombre *</label>
            <input id="skill-name" class="tl-input" type="text" placeholder="Bowling Bash">
          </div>
          <div class="col-md-5">
            <label class="tl-field-label">Imagen (URL)</label>
            <input id="skill-img" class="tl-input" type="url" placeholder="https://...">
          </div>
          <div class="col-md-2">
            <label class="tl-field-label">Orden</label>
            <input id="skill-order" class="tl-input" type="number" value="0" min="0">
          </div>
          <div class="col-md-2 d-flex gap-2">
            <button id="btn-save-skill" class="btn-ss active">💾 Guardar</button>
            <button id="btn-cancel-skill" class="btn-ss" style="display:none;">✕ Cancelar</button>
          </div>
        </div>
      </div>
      <div class="card-dark">
        <div class="tl-field-label mb-3" id="skills-count">Cargando...</div>
        <div id="skills-list" class="admin-rows">
          <div class="admin-loading">Cargando...</div>
        </div>
      </div>
    </div>

    <!-- ─── TAB: TALENTOS ──────────────────────────────────────────── -->
    <div id="tab-talents" style="display:none;">
      <div class="card-dark mb-4">
        <div class="admin-form-title" id="talent-form-title">Añadir talento</div>
        <div class="row g-3 align-items-end">
          <div class="col-md-3">
            <label class="tl-field-label">Nombre *</label>
            <input id="talent-name" class="tl-input" type="text" placeholder="Bowling Bash">
          </div>
          <div class="col-md-5">
            <label class="tl-field-label">Imagen (URL)</label>
            <input id="talent-img" class="tl-input" type="url" placeholder="https://...">
          </div>
          <div class="col-md-2">
            <label class="tl-field-label">Orden</label>
            <input id="talent-order" class="tl-input" type="number" value="0" min="0">
          </div>
          <div class="col-md-2 d-flex gap-2">
            <button id="btn-save-talent" class="btn-ss active">💾 Guardar</button>
            <button id="btn-cancel-talent" class="btn-ss" style="display:none;">✕ Cancelar</button>
          </div>
        </div>
      </div>
      <div class="card-dark">
        <div class="tl-field-label mb-3" id="talents-count">Cargando...</div>
        <div id="talents-list" class="admin-rows">
          <div class="admin-loading">Cargando...</div>
        </div>
      </div>
    </div>

  </main>

  <!-- Confirm Modal -->
  <div id="confirm-modal" class="tl-modal-overlay" style="display:none;">
    <div class="tl-modal-box" style="max-width:380px;">
      <div class="tl-modal-title" id="confirm-title">¿Confirmar?</div>
      <p id="confirm-msg" style="color:rgba(255,255,255,.6);font-size:.88rem;margin:.5rem 0 1.5rem;"></p>
      <div class="d-flex gap-2 justify-content-end">
        <button id="confirm-cancel" class="btn-ss">Cancelar</button>
        <button id="confirm-ok" class="btn-ss" style="background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.4);color:#fca5a5;">Confirmar</button>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/components.js"></script>
  <script type="module" src="../../assets/js/pages/admin-tierlist.js"></script>
</body>
</html>
