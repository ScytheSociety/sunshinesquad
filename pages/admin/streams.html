<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin · Streams · Sunshine Squad</title>
  <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/sun_2600-fe0f.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/pages/admin.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-4">

    <div class="admin-page-header">
      <a href="index.html" class="btn-ss" style="width:auto;">← Dashboard</a>
      <div>
        <h1>📺 Streams</h1>
        <p class="subtitle">Gestiona los canales de Twitch en la home</p>
      </div>
      <div id="admin-role-badge" class="admin-role-badge ms-auto"></div>
    </div>

    <div id="access-denied" class="card-dark text-center py-5" style="display:none;">
      <div style="font-size:3rem;">🔒</div>
      <h3 style="color:#ef4444;margin:.75rem 0 .5rem;">Acceso denegado</h3>
      <p class="text-muted-ss">Necesitas ser Editor, Moderador o Admin.</p>
    </div>

    <div id="admin-content" style="display:none;">
      <div class="row g-4">

        <!-- Lista -->
        <div class="col-lg-6">
          <div class="card-dark">
            <div class="d-flex align-items-center justify-content-between mb-3">
              <div class="admin-form-title mb-0">Canales registrados</div>
              <button class="btn-indigo" style="font-size:.8125rem;" id="btn-new-stream">+ Agregar canal</button>
            </div>
            <div id="streams-list"><div class="admin-loading">Cargando...</div></div>
          </div>
        </div>

        <!-- Formulario -->
        <div class="col-lg-6">
          <div class="card-dark">
            <div class="admin-form-title mb-3" id="form-title">Agregar canal</div>
            <form id="stream-form" autocomplete="off">
              <input type="hidden" id="f-id">
              <div class="mb-3">
                <label class="admin-label">Nombre a mostrar *</label>
                <input type="text" class="form-control" id="f-name" placeholder="ElXokas" required>
              </div>
              <div class="mb-3">
                <label class="admin-label">Username de Twitch *</label>
                <div class="input-group">
                  <span class="input-group-text" style="font-size:.8rem;">twitch.tv/</span>
                  <input type="text" class="form-control" id="f-channel" placeholder="elxokas" required>
                </div>
                <div style="font-size:.72rem;color:rgba(255,255,255,.3);margin-top:.25rem;">Solo el nombre del canal, sin la URL completa</div>
              </div>
              <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" id="f-activo" checked>
                <label class="form-check-label" for="f-activo">Canal activo</label>
              </div>
              <div class="d-flex gap-2">
                <button type="submit" class="btn-indigo flex-fill">Guardar</button>
                <button type="button" class="btn-ss flex-fill" id="btn-cancel-stream">Cancelar</button>
              </div>
            </form>
          </div>

          <!-- Preview -->
          <div class="card-dark mt-3" id="stream-preview" style="display:none;">
            <div class="admin-form-title mb-2">Vista previa</div>
            <a id="preview-link" href="#" target="_blank" style="font-size:.85rem;color:#a5b4fc;text-decoration:none;display:flex;align-items:center;gap:.5rem;">
              <span style="font-size:1.2rem;">📺</span>
              <span id="preview-text">twitch.tv/canal</span>
            </a>
          </div>
        </div>

      </div>
    </div>

  </main>

  <div id="footer-container"></div>
  <div id="admin-toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/components.js"></script>
  <script type="module" src="../../assets/js/pages/admin-streams.js"></script>
</body>
</html>
