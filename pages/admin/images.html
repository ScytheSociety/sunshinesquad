<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin · Imágenes · Sunshine Squad</title>
  <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/sun_2600-fe0f.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/pages/admin.css">
  <style>
    .img-upload-zone {
      border: 2px dashed rgba(99,102,241,.35);
      border-radius: 14px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      background: rgba(99,102,241,.04);
    }
    .img-upload-zone:hover, .img-upload-zone.drag-over {
      border-color: #6366f1;
      background: rgba(99,102,241,.1);
    }
    .img-upload-zone input[type=file] { display: none; }
    .img-upload-icon { font-size: 2.5rem; margin-bottom: .5rem; }
    .img-upload-hint { font-size: .8rem; color: rgba(255,255,255,.35); margin-top: .4rem; }

    .img-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    .img-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: border-color .15s, transform .12s;
    }
    .img-card:hover { border-color: rgba(99,102,241,.4); transform: translateY(-2px); }
    .img-card img { width: 100%; height: 100px; object-fit: cover; display: block; background: rgba(255,255,255,.03); }
    .img-card-info { padding: 6px 8px; }
    .img-card-name { font-size: .68rem; color: rgba(255,255,255,.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .img-card-meta { font-size: .6rem; color: rgba(255,255,255,.3); margin-top: 1px; }
    .img-card-actions {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.82);
      border-radius: 11px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      backdrop-filter: blur(2px);
    }
    .img-card:hover .img-card-actions { display: flex; }
    .img-card-actions button, .img-card-actions a {
      font-size: .72rem;
      padding: .3rem .8rem;
      border-radius: 7px;
      width: 80%;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
    }
    .progress-bar-wrap {
      height: 4px;
      background: rgba(255,255,255,.08);
      border-radius: 99px;
      overflow: hidden;
      margin-top: .5rem;
    }
    .progress-bar-fill {
      height: 100%;
      background: #6366f1;
      border-radius: 99px;
      width: 0%;
      transition: width .2s;
    }
    .cat-badge {
      display: inline-block;
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .3px;
      text-transform: uppercase;
      padding: .1rem .45rem;
      border-radius: 999px;
      background: rgba(99,102,241,.15);
      border: 1px solid rgba(99,102,241,.3);
      color: #a5b4fc;
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-4">

    <div class="admin-page-header">
      <a href="index.html" class="btn-ss" style="width:auto;">← Dashboard</a>
      <div>
        <h1>🖼️ Gestión de Imágenes</h1>
        <p class="subtitle">Sube y gestiona las imágenes del sitio</p>
      </div>
      <div id="admin-role-badge" class="admin-role-badge ms-auto"></div>
    </div>

    <div id="access-denied" class="card-dark text-center py-5" style="display:none;">
      <div style="font-size:3rem;">🔒</div>
      <h3 style="color:#ef4444;margin:.75rem 0 .5rem;">Acceso denegado</h3>
      <p class="text-muted-ss">Necesitas ser Editor, Moderador o Admin.</p>
    </div>

    <div id="admin-content" style="display:none;">
      <div class="row g-4">

        <!-- Panel de subida -->
        <div class="col-lg-4">
          <div class="card-dark">
            <div class="admin-form-title mb-3">Subir imagen</div>

            <div class="img-upload-zone" id="upload-zone">
              <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp,image/gif">
              <div class="img-upload-icon" id="upload-icon">📁</div>
              <div style="font-size:.85rem;color:rgba(255,255,255,.7);" id="upload-text">Arrastra una imagen o haz clic</div>
              <div class="img-upload-hint">JPG, PNG, WebP, GIF · Máx 5 MB</div>
            </div>

            <!-- Preview -->
            <div id="upload-preview" style="display:none;margin-top:.75rem;">
              <img id="preview-img" src="" alt="preview" style="width:100%;border-radius:10px;max-height:180px;object-fit:contain;background:rgba(255,255,255,.03);">
              <div id="preview-name" style="font-size:.75rem;color:rgba(255,255,255,.5);margin-top:.4rem;"></div>
            </div>

            <!-- Progreso -->
            <div id="upload-progress" style="display:none;margin-top:.5rem;">
              <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
              <div style="font-size:.72rem;color:rgba(255,255,255,.4);margin-top:.3rem;" id="progress-text">Subiendo...</div>
            </div>

            <div class="mb-3 mt-3">
              <label class="admin-label">Categoría</label>
              <select class="form-select" id="upload-cat">
                <option value="general">General</option>
                <option value="games">Juegos</option>
                <option value="blog">Blog</option>
                <option value="banner">Banner</option>
                <option value="avatar">Avatar</option>
              </select>
            </div>

            <button class="btn-indigo w-100" id="btn-upload" disabled>Subir imagen</button>
          </div>

          <!-- Stats -->
          <div class="card-dark mt-3">
            <div class="admin-form-title mb-2">Resumen</div>
            <div id="upload-stats" style="font-size:.82rem;color:rgba(255,255,255,.5);">Cargando...</div>
          </div>
        </div>

        <!-- Galería -->
        <div class="col-lg-8">
          <div class="card-dark">
            <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
              <div class="admin-form-title mb-0">Galería</div>
              <div class="d-flex gap-2 flex-wrap">
                <select class="form-select" style="width:auto;" id="filter-cat">
                  <option value="">Todas</option>
                  <option value="general">General</option>
                  <option value="games">Juegos</option>
                  <option value="blog">Blog</option>
                  <option value="banner">Banner</option>
                  <option value="avatar">Avatar</option>
                </select>
                <button class="btn-ss" style="width:auto;padding:.3rem .75rem;font-size:.8rem;" id="btn-refresh">↺</button>
              </div>
            </div>
            <div id="gallery"><div class="admin-loading">Cargando...</div></div>
          </div>
        </div>

      </div>
    </div>

  </main>

  <!-- Modal copiar URL -->
  <div id="copy-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9000;align-items:center;justify-content:center;">
    <div style="background:#0f1117;border:1px solid rgba(99,102,241,.3);border-radius:16px;padding:1.5rem;max-width:440px;width:90%;">
      <div style="font-weight:800;margin-bottom:.75rem;">URL de la imagen</div>
      <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:.6rem .8rem;font-size:.8rem;word-break:break-all;margin-bottom:.75rem;" id="modal-url"></div>
      <img id="modal-img" src="" style="width:100%;border-radius:8px;max-height:160px;object-fit:contain;background:rgba(255,255,255,.03);margin-bottom:.75rem;">
      <div class="d-flex gap-2">
        <button class="btn-indigo flex-fill" id="btn-copy-url">Copiar URL</button>
        <button class="btn-ss flex-fill" id="btn-close-modal">Cerrar</button>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>
  <div id="admin-toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/components.js"></script>
  <script type="module" src="../../assets/js/pages/admin-images.js"></script>
</body>
</html>
