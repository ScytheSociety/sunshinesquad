<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MVP Tracker Admin · Sunshine Squad</title>
  <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/sun_2600-fe0f.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/pages/admin.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-4">

    <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-3">
      <div>
        <h1 style="font-size:1.8rem;font-weight:900;margin-bottom:.25rem;">💀 MVP Tracker Admin</h1>
        <p class="text-muted-ss mb-0">Gestiona los registros de MVPs y el catálogo de bosses.</p>
      </div>
      <a href="index.html" class="btn btn-sm"
        style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);">
        ← Dashboard
      </a>
    </div>

    <div id="access-denied" class="card-dark text-center py-5" style="display:none;">
      <div style="font-size:3rem;">🔒</div>
      <h3 style="color:#ef4444;margin:.75rem 0 .5rem;">Acceso denegado</h3>
      <p class="text-muted-ss">Necesitas ser Moderador o Admin para acceder a este panel.</p>
    </div>

    <div id="mvp-content" style="display:none;">

      <!-- Stats -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
          <div class="card-dark text-center py-3">
            <div style="font-size:1.6rem;font-weight:900;color:#a5b4fc;" id="stat-total">—</div>
            <div style="font-size:.72rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.4px;margin-top:.2rem;">Kills totales</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card-dark text-center py-3">
            <div style="font-size:1.6rem;font-weight:900;color:#6ee7b7;" id="stat-active">—</div>
            <div style="font-size:.72rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.4px;margin-top:.2rem;">Activos</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card-dark text-center py-3">
            <div style="font-size:1.6rem;font-weight:900;color:#fbbf24;" id="stat-hunters">—</div>
            <div style="font-size:.72rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.4px;margin-top:.2rem;">Hunters únicos</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card-dark text-center py-3">
            <div style="font-size:1.1rem;font-weight:800;color:#f472b6;padding:0 .5rem;word-break:break-word;" id="stat-top">—</div>
            <div style="font-size:.72rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.4px;margin-top:.2rem;">MVP más matado</div>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="d-flex gap-2 mb-4">
        <button id="tab-kills" class="btn-ss active" onclick="switchTab('kills')">📋 Historial de Kills</button>
        <button id="tab-bosses" class="btn-ss" onclick="switchTab('bosses')">📖 Catálogo de Bosses</button>
      </div>

      <!-- Kills panel -->
      <div id="panel-kills">
        <div class="card-dark">
          <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
            <div class="tl-field-label mb-0">Historial de kills</div>
            <div class="d-flex gap-2 flex-wrap">
              <select id="filter-status" class="form-select form-select-sm"
                style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:8px;width:auto;">
                <option value="all">Todos</option>
                <option value="active">Activos</option>
                <option value="expired">Expirados</option>
              </select>
              <button class="btn btn-sm" style="background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.35);color:#a5b4fc;" onclick="loadKills()">🔄 Actualizar</button>
            </div>
          </div>
          <div id="kills-table"><div class="text-center py-4" style="color:rgba(255,255,255,.3);">Cargando…</div></div>
        </div>
      </div>

      <!-- Bosses panel -->
      <div id="panel-bosses" style="display:none;">
        <div class="card-dark">
          <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
            <div class="tl-field-label mb-0">Catálogo de bosses</div>
            <input id="boss-search" type="text" placeholder="Buscar boss…" class="form-control form-control-sm"
              style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:8px;width:200px;"
              oninput="filterBosses()">
          </div>
          <div id="bosses-table"><div class="text-center py-4" style="color:rgba(255,255,255,.3);">Cargando…</div></div>
        </div>
      </div>

    </div>

  </main>

  <div id="footer-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/components.js"></script>
  <script type="module" src="../../assets/js/pages/admin-mvp.js"></script>
</body>
</html>
