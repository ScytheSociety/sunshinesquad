<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin · Horario · Sunshine Squad</title>
  <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/sun_2600-fe0f.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/pages/admin.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-4">

    <div class="admin-page-header">
      <a href="index.html" class="btn-ss" style="width:auto;">← Dashboard</a>
      <div>
        <h1>📅 Horario & Eventos</h1>
        <p class="subtitle">Gestiona el horario semanal del clan</p>
      </div>
      <div id="admin-role-badge" class="admin-role-badge ms-auto"></div>
    </div>

    <div id="access-denied" class="card-dark text-center py-5" style="display:none;">
      <div style="font-size:3rem;">🔒</div>
      <h3 style="color:#ef4444;margin:.75rem 0 .5rem;">Acceso denegado</h3>
      <p class="text-muted-ss">Necesitas ser Moderador o Admin.</p>
    </div>

    <div id="admin-content" style="display:none;">
      <div class="row g-4">

        <!-- Lista de eventos -->
        <div class="col-lg-6">
          <div class="card-dark h-100">
            <div class="d-flex align-items-center justify-content-between mb-3">
              <span class="admin-form-title mb-0">Eventos registrados</span>
              <button class="btn-indigo" style="font-size:.8125rem;padding:.35rem .8rem;" id="btn-new-ev">+ Nuevo evento</button>
            </div>
            <div id="events-list"><div class="admin-loading">Cargando...</div></div>
          </div>
        </div>

        <!-- Formulario -->
        <div class="col-lg-6">
          <div class="card-dark">
            <div class="admin-form-title mb-3" id="form-title">Nuevo evento</div>

            <form id="event-form" autocomplete="off">
              <input type="hidden" id="f-editing">
              <input type="hidden" id="f-id">

              <!-- Nombre -->
              <div class="mb-3">
                <label class="admin-label" for="f-evento">Nombre del evento <span style="color:#ef4444;">*</span></label>
                <input type="text" class="form-control" id="f-evento" placeholder="War of Emperium, Raid Semanal…" required>
              </div>

              <!-- Juego + Duración -->
              <div class="row g-3 mb-3">
                <div class="col-7">
                  <label class="admin-label" for="f-juego">Juego <span style="color:#ef4444;">*</span></label>
                  <select class="form-select" id="f-juego" required>
                    <option value="">— Selecciona un juego —</option>
                  </select>
                </div>
                <div class="col-5">
                  <label class="admin-label" for="f-duracion">Duración (horas)</label>
                  <input type="number" class="form-control" id="f-duracion" value="2" min="0.5" step="0.5">
                </div>
              </div>

              <!-- Fecha + Hora + Timezone -->
              <div class="row g-3 mb-3">
                <div class="col-5">
                  <label class="admin-label" for="f-fecha">Fecha</label>
                  <input type="date" class="form-control" id="f-fecha">
                </div>
                <div class="col-3">
                  <label class="admin-label" for="f-hora">Hora <span style="color:#ef4444;">*</span></label>
                  <input type="time" class="form-control" id="f-hora" required>
                </div>
                <div class="col-4">
                  <label class="admin-label" for="f-timezone">Zona horaria</label>
                  <select class="form-select" id="f-timezone">
                    <option value="UTC">UTC</option>
                    <option value="America/Lima">Lima (PET)</option>
                    <option value="America/Los_Angeles">Los Ángeles (PST)</option>
                    <option value="America/New_York">Nueva York (EST)</option>
                    <option value="America/Mexico_City">México (CST)</option>
                    <option value="America/Bogota">Bogotá (COT)</option>
                    <option value="America/Buenos_Aires">Buenos Aires (ART)</option>
                    <option value="Europe/Madrid">Madrid (CET)</option>
                  </select>
                </div>
              </div>

              <!-- Descripción -->
              <div class="mb-3">
                <label class="admin-label" for="f-descripcion">Descripción <small>(opcional)</small></label>
                <textarea class="form-control" id="f-descripcion" rows="3" placeholder="¿De qué trata este evento?"></textarea>
              </div>

              <!-- Visible en horario -->
              <div class="d-flex align-items-center gap-2 p-3 mb-3"
                   style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;">
                <div class="form-check form-switch mb-0">
                  <input class="form-check-input" type="checkbox" id="f-activo" checked>
                </div>
                <div>
                  <label class="form-check-label fw-semibold" for="f-activo">Visible en el horario</label>
                  <div style="font-size:.78rem;color:rgba(255,255,255,.35);margin-top:1px;">
                    Si está desactivado, el evento no aparece en la página de horario
                  </div>
                </div>
              </div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn-indigo flex-fill" style="padding:.55rem;">Guardar evento</button>
                <button type="button" class="btn-ss flex-fill" style="padding:.55rem;" id="btn-cancel-ev">Cancelar</button>
              </div>
            </form>
          </div>
        </div>

      </div>
    </div>

  </main>

  <div id="footer-container"></div>
  <div id="admin-toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/components.js"></script>
  <script type="module" src="../../assets/js/pages/admin-schedule.js"></script>
</body>
</html>
