<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Perfil · Sunshine Squad</title>
  <meta name="description" content="Perfil de jugador en Sunshine Squad.">
  <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/sun_2600-fe0f.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/pages/perfil.css">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="container py-4" id="perfil-main">

    <!-- Loading -->
    <div id="perfil-loading" class="text-center py-5" style="color:rgba(255,255,255,.3);">
      Cargando perfil…
    </div>

    <!-- Not found -->
    <div id="perfil-not-found" class="perfil-not-found" style="display:none;">
      <div class="perfil-not-found-icon">🔍</div>
      <h2 style="font-size:1.3rem;font-weight:800;color:#fff;margin-bottom:.5rem;">Usuario no encontrado</h2>
      <p style="color:rgba(255,255,255,.4);font-size:.9rem;">Este jugador no está registrado en el bot todavía.</p>
      <a href="../../pages/miembros/miembros.html" class="btn btn-indigo btn-sm mt-2">Ver directorio</a>
    </div>

    <!-- Profile content -->
    <div id="perfil-content" style="display:none;">

      <!-- Header -->
      <div class="perfil-header mb-4">
        <img id="p-avatar" src="" alt="" class="perfil-avatar">
        <div style="flex:1;min-width:0;">
          <h1 class="perfil-name" id="p-name"></h1>
          <div class="perfil-sub" id="p-sub"></div>
          <span class="perfil-role-badge" id="p-role" style="display:none;"></span>
        </div>
      </div>

      <!-- Stats strip -->
      <div class="perfil-stats mb-4" id="p-stats"></div>

      <!-- Two-column layout -->
      <div class="row g-4">

        <!-- Left col -->
        <div class="col-lg-7">

          <!-- Juegos -->
          <div class="card-dark mb-4" id="p-games-section" style="display:none;">
            <div class="perfil-section-title">🎮 Juegos</div>
            <div class="row g-2" id="p-games"></div>
          </div>

          <!-- Personajes -->
          <div class="card-dark mb-4" id="p-chars-section" style="display:none;">
            <div class="perfil-section-title">⚔️ Personajes</div>
            <div class="row g-2" id="p-chars"></div>
          </div>

        </div>

        <!-- Right col -->
        <div class="col-lg-5">

          <!-- Logros -->
          <div class="card-dark mb-4" id="p-achievements-section" style="display:none;">
            <div class="perfil-section-title">🏆 Logros</div>
            <div class="row g-2" id="p-achievements"></div>
          </div>

          <!-- Eventos asistidos -->
          <div class="card-dark" id="p-events-section" style="display:none;">
            <div class="perfil-section-title">📅 Eventos asistidos</div>
            <div class="d-flex flex-column gap-2" id="p-events"></div>
          </div>

        </div>
      </div>

    </div><!-- /perfil-content -->
  </main>

  <div id="footer-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/components.js"></script>
  <script type="module" src="../../assets/js/pages/perfil.js"></script>
</body>
</html>
