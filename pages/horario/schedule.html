<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Horario · Sunshine Squad</title>
  <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/sun_2600-fe0f.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/pages/schedule.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-4">

    <div class="mb-3">
      <h1 style="font-weight:800;">📅 Horario de actividades</h1>
      <p class="text-muted-ss">Eventos y sesiones de juego. Los horarios se muestran en tu zona horaria local.</p>
    </div>

    <div class="card-dark">

      <!-- Navegación semana -->
      <div class="schedule-week-nav">
        <button id="schedule-prev" class="schedule-week-btn">←</button>
        <div id="schedule-week-label" class="schedule-week-label"></div>
        <button id="schedule-next" class="schedule-week-btn">→</button>
      </div>

      <div id="schedule-tz" class="schedule-tz"></div>

      <!-- Leyenda -->
      <div class="schedule-legend">
        <div class="legend-item">
          <span class="legend-dot" style="background:rgba(34,197,94,.5);"></span> Activo
        </div>
        <div class="legend-item">
          <span class="legend-dot" style="background:rgba(99,102,241,.5);"></span> Próximo
        </div>
        <div class="legend-item">
          <span class="legend-dot" style="background:rgba(100,116,139,.4);"></span> Pasado
        </div>
        <div class="legend-item">
          <span class="legend-dot" style="background:#ef4444;border-radius:50%;"></span> Ahora
        </div>
      </div>

      <!-- Horario — el JS lo construye dentro de este div -->
      <div id="schedule-outer" class="schedule-outer"></div>

    </div>

  </main>

  <div id="footer-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/components.js"></script>
  <script type="module" src="../../assets/js/pages/schedule.js"></script>
</body>
</html>
