<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Horario · Sunshine Squad</title>
  <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/sun_2600-fe0f.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/pages/schedule.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-4">

    <!-- Header -->
    <div class="d-flex align-items-start justify-content-between gap-3 mb-3 flex-wrap">
      <div>
        <h1 style="font-weight:800;margin-bottom:.2rem;">📅 Horario de actividades</h1>
        <p class="text-muted-ss mb-0">Eventos y sesiones de juego. Los horarios se muestran en tu zona horaria local.</p>
      </div>
      <div class="d-flex gap-2 align-items-center flex-wrap">
        <!-- Filtro por juego -->
        <select id="filter-game" class="form-select form-select-sm"
          style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);
                 border-radius:8px;font-size:.82rem;width:auto;min-width:130px;">
          <option value="">Todos los juegos</option>
        </select>
        <!-- Suscribir iCal -->
        <a href="https://sunshinesquad.es/api/calendar/ical" download="sunshine-squad.ics"
           class="btn btn-sm"
           style="background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.35);color:#a5b4fc;
                  white-space:nowrap;font-size:.82rem;">
          📡 Suscribir (.ics)
        </a>
      </div>
    </div>

    <!-- View tabs -->
    <div class="d-flex gap-2 mb-3">
      <button class="btn btn-sm btn-indigo active" id="tab-week" data-view="week">📅 Semana</button>
      <button class="btn btn-sm" id="tab-month" data-view="month"
        style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);">
        🗓 Mes
      </button>
    </div>

    <div class="card-dark">

      <!-- Navegación semana -->
      <div class="schedule-week-nav" id="week-nav">
        <button id="schedule-prev" class="schedule-week-btn">←</button>
        <div id="schedule-week-label" class="schedule-week-label"></div>
        <button id="schedule-next" class="schedule-week-btn">→</button>
      </div>

      <!-- Navegación mes -->
      <div class="schedule-week-nav" id="month-nav" style="display:none;">
        <button id="month-prev" class="schedule-week-btn">←</button>
        <div id="month-label" class="schedule-week-label"></div>
        <button id="month-next" class="schedule-week-btn">→</button>
      </div>

      <div id="schedule-tz" class="schedule-tz"></div>

      <!-- Leyenda -->
      <div class="schedule-legend">
        <div class="legend-item"><span class="legend-dot" style="background:rgba(34,197,94,.5);"></span> Activo</div>
        <div class="legend-item"><span class="legend-dot" style="background:rgba(99,102,241,.5);"></span> Próximo</div>
        <div class="legend-item"><span class="legend-dot" style="background:rgba(100,116,139,.4);"></span> Pasado</div>
        <div class="legend-item" id="legend-now"><span class="legend-dot" style="background:#ef4444;border-radius:50%;"></span> Ahora</div>
      </div>

      <!-- Vista semana -->
      <div id="schedule-outer" class="schedule-outer"></div>

      <!-- Vista mes -->
      <div id="month-outer" style="display:none;"></div>

    </div>

  </main>

  <div id="footer-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/components.js"></script>
  <script type="module" src="../../assets/js/pages/schedule.js"></script>
</body>
</html>
