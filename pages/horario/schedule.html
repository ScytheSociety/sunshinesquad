<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Horario · Sunshine Squad</title>
  <link rel="icon" href="../../assets/images/favicon.png">

  <!-- ===================== NO TOCAR (BASE) ===================== -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <!-- =================== /NO TOCAR (BASE) ===================== -->

  <link rel="stylesheet" href="../../assets/css/pages/schedule.css">
</head>
<body>

  <!-- ===================== NO TOCAR (BASE) ===================== -->
  <div id="navbar-container"></div>
  <!-- =================== /NO TOCAR (BASE) ===================== -->

  <main class="container py-4">

    <div class="mb-3">
      <h1 style="font-weight:800;">📅 Horario de actividades</h1>
      <p class="text-muted-ss">Eventos y sesiones de juego. Los horarios se muestran en tu zona horaria local.</p>
    </div>

    <div class="card-dark">

      <!-- Navegación semana -->
      <div class="schedule-week-nav">
        <button id="schedule-prev" class="schedule-week-btn">←</button>
        <div id="schedule-week-label" class="schedule-week-label"></div>
        <button id="schedule-next" class="schedule-week-btn">→</button>
      </div>

      <div id="schedule-tz" class="schedule-tz"></div>

      <!-- Leyenda -->
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1rem;">
        <div style="display:flex;align-items:center;gap:5px;font-size:.75rem;color:rgba(255,255,255,.5);">
          <span style="width:10px;height:10px;border-radius:2px;background:rgba(34,197,94,.4);display:inline-block;"></span> Activo
        </div>
        <div style="display:flex;align-items:center;gap:5px;font-size:.75rem;color:rgba(255,255,255,.5);">
          <span style="width:10px;height:10px;border-radius:2px;background:rgba(99,102,241,.4);display:inline-block;"></span> Próximo
        </div>
        <div style="display:flex;align-items:center;gap:5px;font-size:.75rem;color:rgba(255,255,255,.5);">
          <span style="width:10px;height:10px;border-radius:2px;background:rgba(100,116,139,.3);display:inline-block;"></span> Pasado
        </div>
        <div style="display:flex;align-items:center;gap:5px;font-size:.75rem;color:rgba(255,255,255,.5);">
          <span style="width:10px;height:10px;border-radius:2px;background:#ef4444;display:inline-block;border-radius:50%;"></span> Ahora
        </div>
      </div>

      <!-- Grid del horario -->
      <div id="schedule-container" class="schedule-container"></div>

    </div>

  </main>

  <!-- ===================== NO TOCAR (BASE) ===================== -->
  <div id="footer-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/components.js"></script>
  <!-- =================== /NO TOCAR (BASE) ===================== -->

  <script type="module" src="../../assets/js/pages/schedule.js"></script>

</body>
</html>
