<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tier List Builder · Sunshine Squad</title>
  <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/sun_2600-fe0f.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/pages/tierlist.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container py-4">

    <!-- Header -->
    <div class="d-flex align-items-start justify-content-between gap-3 mb-4 flex-wrap">
      <div>
        <h1 style="font-size:1.8rem;font-weight:900;margin-bottom:.25rem;">🏅 Tier List Builder</h1>
        <p class="text-muted-ss mb-0">Arrastra los ítems entre los tiers. Exporta como PNG cuando termines.</p>
      </div>
      <div class="d-flex gap-2 flex-wrap">
        <button id="btn-reset"  class="btn-ss">🔄 Resetear</button>
        <button id="btn-export" class="btn-ss">📷 Exportar PNG</button>
        <button id="btn-share"  class="btn-ss active">🔗 Guardar y compartir</button>
      </div>
    </div>

    <!-- Controles -->
    <div class="card-dark mb-3">
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <div class="tl-field-label">Juego</div>
          <select id="tl-juego" class="tl-select">
            <option value="">— Seleccionar —</option>
            <option value="ragnarok">Ragnarok Online</option>
            <option value="wow">World of Warcraft</option>
            <option value="lineage2">Lineage 2</option>
            <option value="brawlstars">Brawl Stars</option>
            <option value="throneandliberty">Throne &amp; Liberty</option>
          </select>
        </div>
        <div class="col-md-5">
          <div class="tl-field-label">Título del tier list</div>
          <input id="tl-titulo" type="text" class="tl-input" placeholder="Ej: Mejores clases para PvP" value="Mi Tier List">
        </div>
        <div class="col-md-3">
          <div class="tl-field-label">Añadir ítem personalizado</div>
          <div class="d-flex gap-2">
            <input id="tl-new-item" type="text" class="tl-input" placeholder="Nombre">
            <button id="btn-add-item" class="btn-ss active" style="white-space:nowrap;">+ Añadir</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Panel URL compartida -->
    <div id="share-panel" class="card-dark mb-3" style="display:none;align-items:center;gap:.75rem;flex-wrap:wrap;">
      <span style="font-size:.82rem;color:rgba(255,255,255,.5);">🔗 Link para compartir:</span>
      <input id="share-url" type="text" readonly
        style="flex:1;min-width:200px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:.4rem .75rem;color:#a5b4fc;font-size:.82rem;font-family:monospace;outline:none;">
      <button id="btn-copy-url" class="btn-ss active" style="white-space:nowrap;font-size:.82rem;">Copiar</button>
    </div>

    <!-- Tier List -->
    <div id="tierlist-wrap" class="card-dark">
      <div id="tl-author" style="display:none;font-size:.75rem;color:rgba(255,255,255,.3);text-align:center;margin-bottom:.5rem;"></div>
      <div id="tl-title-display" style="font-size:1.2rem;font-weight:900;text-align:center;margin-bottom:1rem;color:#fff;"></div>
      <div id="tiers-container"></div>
    </div>

    <!-- Pool de ítems sin clasificar -->
    <div class="card-dark mt-3">
      <div class="d-flex align-items-center justify-content-between mb-2 flex-wrap gap-2">
        <div class="tl-field-label mb-0">Sin clasificar</div>
        <div id="tl-cat-tabs" class="d-flex gap-1" style="font-size:.75rem;"></div>
      </div>
      <div id="pool" class="tl-pool sortable-zone" data-tier="pool"></div>
    </div>

    <!-- Opciones de tiers -->
    <div class="card-dark mt-3">
      <div class="tl-field-label mb-2">Personalizar tiers</div>
      <div class="d-flex gap-2 flex-wrap" id="tier-controls"></div>
    </div>

  </main>

  <!-- Role Selection Modal -->
  <div id="role-modal" class="tl-modal-overlay" style="display:none;">
    <div class="tl-modal-box">
      <div id="role-modal-title" class="tl-modal-title">Selecciona el rol</div>
      <div id="role-modal-options" class="tl-modal-options"></div>
      <div class="d-flex gap-2 justify-content-end mt-3">
        <button id="role-modal-cancel" class="btn-ss">Cancelar</button>
        <button id="role-modal-norole" class="btn-ss active">Sin rol</button>
      </div>
    </div>
  </div>

  <!-- Skill Selection Modal -->
  <div id="skill-modal" class="tl-modal-overlay" style="display:none;">
    <div class="tl-modal-box">
      <div id="skill-modal-title" class="tl-modal-title">Selecciona el skill</div>
      <div id="skill-modal-options" class="tl-skill-options"></div>
      <div class="d-flex gap-2 justify-content-end mt-3">
        <button id="skill-modal-cancel" class="btn-ss">Cerrar</button>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script type="module" src="../../assets/js/components.js"></script>
  <script type="module" src="../../assets/js/pages/tierlist.js"></script>
</body>
</html>
