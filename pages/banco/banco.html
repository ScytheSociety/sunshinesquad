<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Banco del Clan · Sunshine Squad</title>
  <meta name="description" content="Inventario del banco del clan Sunshine Squad.">
  <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/sun_2600-fe0f.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="container py-4">

    <!-- Header -->
    <div class="d-flex align-items-start justify-content-between gap-3 mb-4 flex-wrap">
      <div>
        <h1 style="font-size:1.8rem;font-weight:900;margin-bottom:.25rem;">🏦 Banco del Clan</h1>
        <p class="text-muted-ss mb-0">Inventario y movimientos del banco de la comunidad.</p>
      </div>
    </div>

    <!-- Filtros por juego -->
    <div class="d-flex gap-2 flex-wrap mb-4" id="filtros-game">
      <button class="btn btn-sm btn-indigo active" data-game="">Todos</button>
    </div>

    <!-- Tabs: Inventario / Movimientos -->
    <div class="d-flex gap-2 mb-4">
      <button class="btn btn-sm btn-indigo active" id="tab-items" data-tab="items">📦 Inventario</button>
      <button class="btn btn-sm" id="tab-txn" data-tab="txn"
        style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);">
        📋 Movimientos
      </button>
    </div>

    <!-- Inventario -->
    <div id="panel-items">
      <div id="items-content">
        <div class="text-center py-5" style="color:rgba(255,255,255,.3);">Cargando inventario…</div>
      </div>
    </div>

    <!-- Movimientos -->
    <div id="panel-txn" style="display:none;">
      <div class="card-dark">
        <div id="txn-content">
          <div class="text-center py-5" style="color:rgba(255,255,255,.3);">Cargando movimientos…</div>
        </div>
      </div>
    </div>

  </main>

  <div id="footer-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/components.js"></script>
  <script type="module" src="../../assets/js/pages/banco.js"></script>
</body>
</html>
