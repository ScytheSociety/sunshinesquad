<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cumpleaños · Sunshine Squad</title>
  <meta name="description" content="Cumpleaños de los miembros de Sunshine Squad.">
  <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/sun_2600-fe0f.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="container py-4">

    <!-- Header -->
    <div class="mb-4">
      <h1 style="font-size:1.8rem;font-weight:900;margin-bottom:.25rem;">🎂 Cumpleaños</h1>
      <p class="text-muted-ss mb-0">Próximos cumpleaños de los miembros de la comunidad.</p>
    </div>

    <!-- Hoy / Esta semana -->
    <div id="birthday-today" style="display:none;" class="mb-4">
      <div style="background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.25);border-radius:16px;padding:1.25rem;">
        <div style="font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#fde047;margin-bottom:.75rem;">
          🎉 ¡Hoy es su cumpleaños!
        </div>
        <div id="birthday-today-list" class="d-flex flex-wrap gap-3"></div>
      </div>
    </div>

    <!-- Lista ordenada -->
    <div class="card-dark">
      <div class="perfil-section-title mb-3">Próximos cumpleaños</div>
      <div id="birthday-list">
        <div class="text-center py-5" style="color:rgba(255,255,255,.3);">Cargando…</div>
      </div>
    </div>

  </main>

  <div id="footer-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/components.js"></script>
  <script type="module" src="../../assets/js/pages/cumpleanos.js"></script>
</body>
</html>
