<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cumpleaños · Sunshine Squad</title>
  <meta name="description" content="Cumpleaños de los miembros de Sunshine Squad.">
  <meta property="og:title" content="Cumpleaños · Sunshine Squad">
  <meta property="og:description" content="Cumpleaños de los miembros de la comunidad Sunshine Squad.">
  <meta property="og:image" content="https://i.imgur.com/p7OlADi.gif">
  <meta property="og:url" content="https://sunshinesquad.es/pages/cumpleanos/cumpleanos.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Sunshine Squad">
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/sun_2600-fe0f.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <style>
    @keyframes bday-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(250,204,21,.5), 0 4px 24px rgba(250,204,21,.15); }
      50%       { box-shadow: 0 0 0 6px rgba(250,204,21,0), 0 4px 24px rgba(250,204,21,.35); }
    }
    .bday-today-card { animation: bday-pulse 2s ease-in-out infinite; }
    @keyframes confetti-float {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: .7; }
      50%       { transform: translateY(-6px) rotate(8deg); opacity: 1; }
    }
    .bday-emoji { display: inline-block; animation: confetti-float 2.2s ease-in-out infinite; }
    .bday-card {
      display:flex;flex-direction:column;align-items:center;gap:.6rem;
      padding:1.25rem 1rem;border-radius:16px;text-decoration:none;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
      transition:border-color .15s,background .15s;position:relative;overflow:hidden;
    }
    .bday-card:hover { background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.14); }
    .bday-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px; }
    .bday-avatar-ring-today { border:3px solid #fbbf24; }
    .bday-avatar-ring-soon  { border:3px solid #a5b4fc; }
    .bday-avatar-ring       { border:3px solid rgba(255,255,255,.12); }
    .bday-badge {
      position:absolute;top:8px;right:8px;font-size:.6rem;font-weight:800;
      letter-spacing:.3px;text-transform:uppercase;padding:.15rem .45rem;border-radius:20px;
    }
    .bday-badge-today { background:rgba(250,204,21,.2);color:#fde047;border:1px solid rgba(250,204,21,.3); }
    .bday-badge-next  { background:rgba(165,180,252,.15);color:#c7d2fe;border:1px solid rgba(165,180,252,.25); }
  </style>
</head>
<body>

  <div id="navbar-container"></div>

  <main class="container py-4">

    <!-- Header -->
    <div class="mb-4">
      <h1 style="font-size:1.8rem;font-weight:900;margin-bottom:.25rem;">🎂 Cumpleaños</h1>
      <p class="text-muted-ss mb-0">Próximos cumpleaños de los miembros de la comunidad.</p>
    </div>

    <!-- Banner de hoy -->
    <div id="birthday-banner" style="display:none;" class="mb-4">
      <div style="background:linear-gradient(135deg,rgba(250,204,21,.12),rgba(251,146,60,.1));border:1px solid rgba(250,204,21,.3);border-radius:16px;padding:1.5rem;text-align:center;">
        <div class="bday-emoji" style="font-size:2.5rem;margin-bottom:.5rem;">🎉</div>
        <div style="font-size:1rem;font-weight:900;color:#fde047;margin-bottom:.25rem;">¡Hoy es su cumpleaños!</div>
        <div id="birthday-banner-names" style="font-size:.88rem;color:rgba(255,255,255,.7);"></div>
      </div>
    </div>

    <!-- Grid de tarjetas -->
    <div class="card-dark">
      <div id="birthday-list">
        <div class="text-center py-5" style="color:rgba(255,255,255,.3);">Cargando…</div>
      </div>
    </div>

  </main>

  <div id="footer-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/components.js"></script>
  <script type="module" src="../../assets/js/pages/cumpleanos.js"></script>
</body>
</html>
