<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog · Sunshine Squad</title>
  <meta name="description" content="Noticias, guías y contenido de la comunidad Sunshine Squad.">
  <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/sun_2600-fe0f.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/pages/blog.css">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="container py-4">

    <!-- Header -->
    <div class="d-flex align-items-start justify-content-between gap-3 mb-4 flex-wrap">
      <div>
        <h1 style="font-size:1.8rem;font-weight:900;margin-bottom:.25rem;">📝 Blog</h1>
        <p class="text-muted-ss mb-0">Noticias, guías y novedades de la comunidad.</p>
      </div>
      <div id="new-post-btn-wrap"></div>
    </div>

    <!-- Filtros por juego -->
    <div class="d-flex gap-2 flex-wrap mb-4" id="filtros"></div>

    <!-- Lista de posts -->
    <div id="posts-grid" class="row g-3">
      <div class="col-12 text-center py-5">
        <div style="color:rgba(255,255,255,.3);">Cargando posts...</div>
      </div>
    </div>

    <!-- Paginación -->
    <div id="paginacion" class="mt-4 blog-pag"></div>

  </main>

  <div id="footer-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../assets/js/components.js"></script>
  <script type="module" src="../../assets/js/pages/blog.js"></script>
</body>
</html>
